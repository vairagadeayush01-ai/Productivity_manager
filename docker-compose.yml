# Local PostgreSQL for production-like development.
# Usage:
#   docker compose up -d
#   Set in practice_programs/backend/.env:
#     DATABASE_URL=postgresql://productivity:productivity@localhost:5432/productivity_db
#     USE_ALEMBIC=true
#   cd practice_programs/backend && alembic upgrade head

services:
  postgres:
    image: postgres:15-alpine
    container_name: productivity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: productivity
      POSTGRES_PASSWORD: productivity
      POSTGRES_DB: productivity_db
    ports:
      - "5432:5432"
    volumes:
      - productivity_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productivity -d productivity_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  productivity_pgdata:
