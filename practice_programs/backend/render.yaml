services:
  - type: web
    name: productivity-manager-backend
    env: python
    rootDir: practice_programs/backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn Main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
    plan: free
