name: Backend CI

on:
  push:
    paths:
      - "practice_programs/backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "practice_programs/backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: practice_programs/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v --tb=short
        env:
          JWT_SECRET_KEY: ci-test-secret-key-minimum-32-characters
          DATABASE_URL: sqlite:///:memory:
          USE_ALEMBIC: "false"
